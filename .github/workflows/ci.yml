name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      # Nothing here executes, so there are no dependencies to install — stdlib Python is enough.
      - name: Run CI gate
        run: bash scripts/ci.sh

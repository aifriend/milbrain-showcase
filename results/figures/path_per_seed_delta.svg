<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
<title id="ttl">Per-seed effect of the tree (path) voting topology vs all-to-all</title>
<desc id="desc">Ten bars, one per random-rotation seed, showing tree-minus-all-to-all recognition accuracy. They swing from minus 2.9 to plus 8.6 points yet average only plus 1.4, so large per-seed effects nearly cancel in the mean. Most bars extend beyond the shaded plus-or-minus 2 point equivalence band even though their average sits inside it.</desc>
<style>
  .t{fill:#3a3d4d}.m{fill:#6c7396}.card{fill:#fbfbfa;stroke:#e4e4ec}
</style>
<rect class="card" x="0.5" y="0.5" width="699" height="419" rx="14"/>
<text class="t" x="24" y="30" font-size="15" font-weight="600">Same wiring, opposite effect per rotation set</text>
<text class="m" x="24" y="49" font-size="12.5">tree (4-edge) minus all-to-all recognition accuracy, one bar per seed</text>

<g transform="translate(8,44)">
  <rect x="55" y="197.3" width="600" height="89.2" fill="#eceef4"/>
  <text class="m" x="60" y="192" font-size="11">±2 pt equivalence band</text>

  <line x1="55" y1="241.9" x2="655" y2="241.9" stroke="#9aa0b5" stroke-width="1.5"/>
  <text class="m" x="658" y="246" font-size="11">0</text>

  <line x1="55" y1="211.8" x2="655" y2="211.8" stroke="#F2B441" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="150" y="207" font-size="12" fill="#b9832a">mean = +1.4 pt</text>

  <rect x="68" y="212.9" width="34" height="29.0" fill="#34C7A0" rx="2"/>
  <rect x="128" y="241.9" width="34" height="46.3" fill="#F2685C" rx="2"/>
  <rect x="188" y="236.1" width="34" height="5.8" fill="#34C7A0" rx="2"/>
  <rect x="248" y="201.3" width="34" height="40.6" fill="#34C7A0" rx="2"/>
  <rect x="308" y="241.9" width="34" height="57.9" fill="#F2685C" rx="2"/>
  <rect x="368" y="154.9" width="34" height="87.0" fill="#34C7A0" rx="2"/>
  <rect x="428" y="85.5" width="34" height="156.4" fill="#34C7A0" rx="2"/>
  <rect x="488" y="241.9" width="34" height="40.5" fill="#F2685C" rx="2"/>
  <rect x="548" y="50.7" width="34" height="191.2" fill="#34C7A0" rx="2"/>
  <rect x="608" y="241.9" width="34" height="63.7" fill="#F2685C" rx="2"/>

  <text class="t" x="85" y="207" text-anchor="middle" font-size="11">+1.3</text>
  <text class="t" x="145" y="300" text-anchor="middle" font-size="11">-2.1</text>
  <text class="t" x="205" y="231" text-anchor="middle" font-size="11">+0.3</text>
  <text class="t" x="265" y="195" text-anchor="middle" font-size="11">+1.8</text>
  <text class="t" x="325" y="312" text-anchor="middle" font-size="11">-2.6</text>
  <text class="t" x="385" y="149" text-anchor="middle" font-size="11">+3.9</text>
  <text class="t" x="445" y="79" text-anchor="middle" font-size="11">+7.0</text>
  <text class="t" x="505" y="295" text-anchor="middle" font-size="11">-1.8</text>
  <text class="t" x="565" y="44" text-anchor="middle" font-size="11">+8.6</text>
  <text class="t" x="625" y="318" text-anchor="middle" font-size="11">-2.9</text>

  <line x1="55" y1="330" x2="655" y2="330" stroke="#e4e4ec" stroke-width="1"/>
  <text class="m" x="85" y="346" text-anchor="middle" font-size="11">0</text>
  <text class="m" x="145" y="346" text-anchor="middle" font-size="11">1</text>
  <text class="m" x="205" y="346" text-anchor="middle" font-size="11">2</text>
  <text class="m" x="265" y="346" text-anchor="middle" font-size="11">3</text>
  <text class="m" x="325" y="346" text-anchor="middle" font-size="11">4</text>
  <text class="m" x="385" y="346" text-anchor="middle" font-size="11">5</text>
  <text class="m" x="445" y="346" text-anchor="middle" font-size="11">6</text>
  <text class="m" x="505" y="346" text-anchor="middle" font-size="11">7</text>
  <text class="m" x="565" y="346" text-anchor="middle" font-size="11">8</text>
  <text class="m" x="625" y="346" text-anchor="middle" font-size="11">9</text>
  <text class="m" x="355" y="366" text-anchor="middle" font-size="12">random-rotation seed  (each = 77 objects at a different set of orientations)</text>

  <text class="m" x="22" y="95" text-anchor="middle" font-size="11" transform="rotate(-90 22 95)">tree better ↑</text>
  <text class="m" x="22" y="300" text-anchor="middle" font-size="11" transform="rotate(-90 22 300)">↓ tree worse</text>
</g>
</svg>
